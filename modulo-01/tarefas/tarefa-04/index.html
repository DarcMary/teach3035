<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cores Aleatórias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <header class="header">
            <h1>Gerador de Cores Aleatórias</h1>
            <p>Clique no botão para gerar uma nova cor em hexadecimal.</p>
        </header>

        <section id="color-box" class="color-box">
            <span id="hex-code" class="hex-code">#1E293B</span>
        </section>

        <button id="change-color-btn" class="btn">
            🎨 Gerar Nova Cor
        </button>

    </main>

    <script src="script.js"></script>

</body>
</html>
